# ProofCoach RL Training Config
# Stage 2: GRPO with Lean 4 proof verification reward
# Reward = 0.50 * lean4_verified + 0.30 * pedagogical_rubric + 0.20 * length_penalty

model:
  name_or_path: "Qwen/Qwen2.5-7B-Instruct"
  sft_checkpoint: "checkpoints/proofcoach-sft-v1"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"
  trust_remote_code: true

lora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

data:
  train_path: "data/rl/lean4_tasks.jsonl"
  max_seq_length: 4096

grpo:
  num_generations: 8          # Sample 8 proof attempts per problem
  temperature: 0.9            # Higher temperature for diversity
  top_p: 0.95
  kl_coeff: 0.05              # KL penalty weight vs frozen SFT reference

reward_weights:
  lean4_verified: 0.50        # Binary: Lean 4 proof compiles and type-checks
  pedagogical_rubric: 0.30    # Rubric score (questions, hints, not giving away answer)
  length_penalty: 0.20        # Penalize overly long or short responses

training:
  output_dir: "checkpoints/proofcoach-rl-v1"
  run_name: "proofcoach-rl-v1"
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-6
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.01
  bf16: true
  optim: "adamw_torch_fused"
  logging_steps: 10
  save_steps: 100
  report_to: "wandb"

wandb:
  project: "proofcoach-rl"
