# ProofCoach DPO Training Config
# Stage 3: Direct Preference Optimization on (chosen_dialogue, rejected_dialogue) pairs
# Chosen = Socratic (hints, questions), Rejected = direct answer giving

model:
  name_or_path: "Qwen/Qwen2.5-7B-Instruct"
  rl_checkpoint: "checkpoints/proofcoach-rl-v1"
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"
  trust_remote_code: true

data:
  train_path: "data/dpo/preference_pairs.jsonl"
  max_length: 4096
  max_prompt_length: 2048

dpo:
  beta: 0.1                   # KL coefficient (lower = more willing to deviate)
  loss_type: "sigmoid"        # "sigmoid" | "hinge" | "ipo"
  label_smoothing: 0.0

training:
  output_dir: "checkpoints/proofcoach-dpo-v1"
  run_name: "proofcoach-dpo-v1"
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-7
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.01
  bf16: true
  optim: "adamw_torch_fused"
  logging_steps: 10
  save_steps: 100
  report_to: "wandb"

wandb:
  project: "proofcoach-dpo"
